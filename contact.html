<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css">
    <style>
        
        body {
                display: flex;
                flex-direction: column;
                justify-content: center; /* Center content vertically */
            }
        .image-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 29px; /* Space between the columns */
        }

        .image-item {
            text-align: center;
        }

        .image-item img {
            max-width: 100%; /* Ensure the image scales properly */
            height: auto; /* Maintain aspect ratio */
            max-height: 300px; /* Limit the height of the images */
        }

        .image-item button {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <main>
        <div class="image-container">
            <div class="image-item">
                <img src="images/Blueskyblue1.png" alt="Image 1">
                <div>
                    <button class="SOCIALS" onclick="window.location.href='https://bsky.app/profile/me.anityex.com'">Bluesky Messages</button>
                </div>
            </div>
            <div class="image-item">
                <img src="images/instagram.png" alt="Image 2">
                <div>
                    <button class="SOCIALS2" onclick="window.location.href='https://www.instagram.com/anity.ex/'">Instagram Messages</button>
                </div>
            </div>
        </div>
    </main>

    <script src="menu.js"></script>
</body>
</html>
