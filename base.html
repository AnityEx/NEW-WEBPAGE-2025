<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple 3D Hover</title>

<style>
.card {
    width: 200px;
    height: 140px;
    perspective: 600px;
    border: 1px solid #ccc;
    margin: 40px;
}

.cube {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.2s;
}

.card:hover .cube {
    transform: rotateY(-50deg);
}

.front, .side {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    font-size: 20px;
}

/* front face */
.front {
    background: lightblue;
}

/* right face */
.side {
    background: lightcoral;
    transform: rotateY(-90deg); 
    transform-origin: right;
}

</style>

</head>
<body>

<div class="card">
    <div class="cube">
        <div class="front">FRONT</div>
        <div class="side">SIDE</div>
    </div>
</div>

</body>
</html>
