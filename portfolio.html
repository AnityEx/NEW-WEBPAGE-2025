<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css">
    <style>
        /* Make the iframe fill the entire page */
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1000; /* Ensure it is below the menu */
        }
    </style>
</head>
<body>
    <iframe 
        src="https://www.yumpu.com/es/embed/view/DiBPcqFuzHsJZTLS" 
        id="portfolio-iframe"
        allowtransparency="true">
    </iframe>

    <script src="menu.js"></script>
    <script>
        const iframe = document.getElementById('portfolio-iframe');
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.hamburger-menu').addEventListener('click', () => {
                iframe.style.pointerEvents = iframe.style.pointerEvents === 'none' ? 'auto' : 'none';
            });
        });
    </script>
</body>
</html>
