  <script class="faceicon">
    window.addEventListener("DOMContentLoaded", () => {
      // Create the image element
      const image = document.createElement('img');
      image.src = "images/face.png";  // Replace with your image URL
      image.id = "bouncing-image";
      image.style.position = "fixed";
      image.style.zIndex = "9999";
      image.style.width = "50px";  // Adjust image size
      image.style.height = "auto";  // Adjust image size
      document.body.appendChild(image);

      // Create the audio element
      const audio = new Audio("sounds/arcade.mp3"); // Replace with your sound file path
      audio.volume = 0.6;
      // Add click event listener to play the sound
      image.addEventListener("click", () => {
        audio.currentTime = 0;  // Reset the sound to the beginning
        audio.play();
      });

      // Set initial position and speed
      let x = 100, y = 110;
      let dx = 3, dy = 2;

      function animate() {
        const ww = window.innerWidth;
        const wh = window.innerHeight;

        // Update position
        x += dx;
        y += dy;

        // Check for collisions with the viewport edges
        if (x + image.offsetWidth >= ww || x <= 0) dx *= -1;
        if (y + image.offsetHeight >= wh || y <= 0) dy *= -1;

        // Apply new position to the image
        image.style.left = x + "px";
        image.style.top = y + "px";

        // Repeat the animation
        requestAnimationFrame(animate);
      }

      animate(); // Start the animation

      // Add mouseover event to bounce the image in a random direction
      image.addEventListener("mouseover", () => {
        // Generate random directions for dx and dy
        dx = (Math.random() * 4 + 2) * (Math.random() < 0.5 ? 1 : -1); // Random speed between 2 and 6
        dy = (Math.random() * 4 + 2) * (Math.random() < 0.5 ? 1 : -1); // Random speed between 2 and 6
      });
    });
  </script>
