<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/info.css"> <!-- Link to the new CSS file -->
</head>
<body>

    <!-- FAQ Section -->
    <section id="faq-section">
        <div class="faq-container" id="faq-container">
            <h2>Preguntas Frecuentes</h2>
            <p>Actualizado 4 de Agosto 2023</p>
        </div>
        <script>
            function toggleFaq(button) {
                const content = button.nextElementSibling;
                content.style.display = content.style.display === 'block' ? 'none' : 'block';
            }

            // Load FAQ from a text file
            async function loadFaq() {
                const response = await fetch('faq.txt'); // Replace with the path to your .txt file
                const text = await response.text();
                const lines = text.split('\n');
                const faqContainer = document.getElementById('faq-container');

                let currentTitle = '';
                lines.forEach(line => {
                    if (line.startsWith('-')) {
                        currentTitle = line.substring(1).trim(); // Remove the '-' and trim whitespace
                    } else if (line.startsWith('+') && currentTitle) {
                        const content = line.substring(1).trim(); // Remove the '+' and trim whitespace

                        // Create FAQ item
                        const faqItem = document.createElement('div');
                        faqItem.classList.add('faq-item');

                        const button = document.createElement('button');
                        button.textContent = currentTitle;
                        button.onclick = () => toggleFaq(button);

                        const faqContent = document.createElement('div');
                        faqContent.classList.add('faq-content');
                        faqContent.textContent = content;

                        faqItem.appendChild(button);
                        faqItem.appendChild(faqContent);
                        faqContainer.appendChild(faqItem);

                        currentTitle = ''; // Reset the title for the next FAQ
                    }
                });
            }

            // Load FAQ on page load
            loadFaq();
        </script>
    </section>
    <script src="menu.js"></script>
</body>
</html>
